<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="greeting" onmouseover="mouseOverElem()" onmouseout="mouseOutElem()">Hello my dear</p>
    
    <p onmousedown="mouseDownElem(this)">I am doing fine</p>

    Onkeydown<input type="text" onkeydown="keyDownElem(this)">
    Onkeyup<input type="text" onkeyup="keyUpElem(this)">
    Oninput<input type="text" oninput="keyInputElem(this)">
    Onchange<input type="text" onchange="keyChangeElem(this)">


    <script src="WK2-3-math-object-event.js"></script>
</body>
</html>
